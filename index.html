<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#3B4694">
<title>なつやすみ しゅくだいチェッカー</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="しゅくだい">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#FBF8F0;
  --card:#FFFFFF;
  --ink:#2B3355;
  --muted:#8B8FA3;
  --asagao:#5560C4;
  --asagao-deep:#3B4694;
  --asagao-pale:#EDEFFB;
  --hana:#D9799E;
  --leaf:#5F9A6E;
  --leaf-pale:#E9F3EB;
  --amber:#C98A2D;
  --amber-pale:#FBF1DE;
  --line:#E6E2D6;
  --radius:16px;
  --shadow:0 1px 3px rgba(43,51,85,.08);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{font-size:16px}
body{
  font-family:"Zen Maru Gothic","Hiragino Maru Gothic ProN","Hiragino Sans","Noto Sans JP",sans-serif;
  font-weight:500;
  background:var(--paper);
  color:var(--ink);
  line-height:1.55;
  padding-bottom:48px;
}
.wrap{max-width:480px;margin:0 auto;padding:0 16px}

/* ---------- header ---------- */
header{
  background:linear-gradient(160deg,var(--asagao-deep) 0%,var(--asagao) 100%);
  color:#fff;
  padding:20px 0 18px;
  border-radius:0 0 24px 24px;
}
.h-top{display:flex;align-items:center;gap:10px}
.h-top svg{flex:none}
.h-title{font-weight:900;font-size:1.05rem;letter-spacing:.04em}
.h-sub{font-size:.72rem;opacity:.75;font-weight:700}
.countdown{display:flex;align-items:baseline;gap:6px;margin-top:12px}
.countdown .big{font-weight:900;font-size:3rem;line-height:1;font-variant-numeric:tabular-nums;letter-spacing:.02em}
.countdown .unit{font-weight:700;font-size:1rem;opacity:.9}
.countdown .until{margin-left:auto;font-size:.75rem;font-weight:700;opacity:.85;text-align:right;line-height:1.4}
/* vine progress */
.vine{margin-top:14px}
.vine-track{position:relative;height:10px;border-radius:5px;background:rgba(255,255,255,.22)}
.vine-fill{position:absolute;left:0;top:0;bottom:0;border-radius:5px;background:linear-gradient(90deg,#8FD0A0,#CDECB8);transition:width .5s ease}
.vine-flower{position:absolute;top:50%;transform:translate(-50%,-50%);transition:left .5s ease}
.vine-label{display:flex;justify-content:space-between;font-size:.72rem;font-weight:700;opacity:.85;margin-top:6px}

/* ---------- sections ---------- */
section{margin-top:22px}
.sec-head{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.sec-head svg{color:var(--asagao-deep)}
.sec-head h2{font-size:.92rem;font-weight:900;letter-spacing:.06em}
.sec-head .note{margin-left:auto;font-size:.72rem;color:var(--muted);font-weight:700}

.card{
  background:var(--card);
  border:1px solid var(--line);
  border-radius:var(--radius);
  box-shadow:var(--shadow);
}

/* ---------- today zone ---------- */
.today-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.today-tile{
  background:var(--card);
  border:2px solid var(--line);
  border-radius:var(--radius);
  box-shadow:var(--shadow);
  padding:16px 12px 14px;
  display:flex;flex-direction:column;align-items:center;gap:8px;
  font-family:inherit;font-weight:900;font-size:.95rem;color:var(--ink);
  cursor:pointer;
  transition:border-color .15s,background .15s;
  min-height:110px;
}
.today-tile .ico{color:var(--asagao);transition:color .15s}
.today-tile .st{font-size:.72rem;font-weight:700;color:var(--muted)}
.today-tile.done{border-color:var(--leaf);background:var(--leaf-pale)}
.today-tile.done .ico{color:var(--leaf)}
.today-tile.done .st{color:var(--leaf)}
.today-total{grid-column:1 / -1;text-align:center;font-size:.75rem;color:var(--muted);font-weight:700}

/* observation alert */
.obs-alert{
  grid-column:1 / -1;
  background:var(--amber-pale);
  border:2px solid var(--amber);
  border-radius:var(--radius);
  padding:12px 14px;
  display:flex;align-items:center;gap:10px;
}
.obs-alert svg{color:var(--amber);flex:none}
.obs-alert .t{font-weight:900;font-size:.9rem}
.obs-alert .d{font-size:.75rem;color:var(--amber);font-weight:700}
.obs-alert button{
  margin-left:auto;flex:none;
  font-family:inherit;font-weight:900;font-size:.8rem;
  background:var(--amber);color:#fff;border:none;border-radius:10px;
  padding:10px 14px;cursor:pointer;
}

/* ---------- counter rows ---------- */
.row{padding:14px;border-bottom:1px solid var(--line);display:flex;flex-direction:column;gap:8px}
.row:last-child{border-bottom:none}
.row-top{display:flex;align-items:center;gap:10px}
.row-top svg{color:var(--asagao-deep);flex:none}
.row-name{font-weight:900;font-size:.95rem}
.row-name small{display:block;font-size:.7rem;color:var(--muted);font-weight:700}
.row-count{margin-left:auto;font-variant-numeric:tabular-nums;font-weight:900;font-size:1.05rem}
.row-count small{font-size:.72rem;color:var(--muted);font-weight:700}
.row-ctrl{display:flex;align-items:center;gap:10px}
.bar{flex:1;height:8px;border-radius:4px;background:var(--asagao-pale);overflow:hidden}
.bar i{display:block;height:100%;border-radius:4px;background:var(--asagao);transition:width .3s ease}
.bar.full i{background:var(--leaf)}
.btn{
  width:44px;height:44px;flex:none;
  border-radius:12px;border:2px solid var(--line);background:var(--card);
  color:var(--asagao-deep);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
}
.btn:active{background:var(--asagao-pale)}
.btn:disabled{opacity:.3}
.done-chip{display:inline-flex;align-items:center;gap:4px;color:var(--leaf);font-weight:900;font-size:.78rem}

/* observation sub-rows */
.obs-list{display:flex;flex-direction:column;gap:6px;margin-top:2px}
.obs-item{
  display:flex;align-items:center;gap:10px;
  background:var(--asagao-pale);border-radius:10px;padding:10px 12px;
  border:none;font-family:inherit;text-align:left;cursor:pointer;width:100%;
  color:var(--ink);
}
.obs-item .num{
  flex:none;width:24px;height:24px;border-radius:50%;
  background:#fff;color:var(--asagao-deep);
  font-weight:900;font-size:.78rem;
  display:flex;align-items:center;justify-content:center;
}
.obs-item .lbl{font-weight:700;font-size:.82rem;line-height:1.35}
.obs-item .lbl small{display:block;font-size:.68rem;color:var(--muted)}
.obs-item .mark{margin-left:auto;flex:none;color:var(--muted)}
.obs-item.done{background:var(--leaf-pale)}
.obs-item.done .num{background:var(--leaf);color:#fff}
.obs-item.done .mark{color:var(--leaf)}
.obs-item.soon{outline:2px solid var(--amber)}

/* ---------- drill 3-stage ---------- */
.stage-btn{
  margin-left:auto;flex:none;
  font-family:inherit;font-weight:900;font-size:.8rem;
  border:none;border-radius:999px;padding:10px 16px;cursor:pointer;
  min-width:118px;
}
.stage-0{background:var(--asagao-pale);color:var(--muted)}
.stage-1{background:var(--amber-pale);color:var(--amber)}
.stage-2{background:var(--leaf-pale);color:var(--leaf)}
.stage-hint{font-size:.68rem;color:var(--muted);font-weight:700;text-align:right}

/* ---------- one-shot ---------- */
.shot{
  display:flex;align-items:center;gap:10px;width:100%;
  padding:14px;border-bottom:1px solid var(--line);
  background:none;border-left:none;border-right:none;border-top:none;
  font-family:inherit;text-align:left;cursor:pointer;color:var(--ink);
}
.shot:last-child{border-bottom:none}
.shot svg.ic{color:var(--asagao-deep);flex:none}
.shot .nm{font-weight:900;font-size:.95rem}
.shot .nm small{display:block;font-size:.7rem;color:var(--muted);font-weight:700}
.shot .box{
  margin-left:auto;flex:none;width:28px;height:28px;border-radius:9px;
  border:2px solid var(--line);display:flex;align-items:center;justify-content:center;
  color:transparent;transition:all .15s;
}
.shot.done .box{background:var(--leaf);border-color:var(--leaf);color:#fff}
.shot.done .nm{color:var(--leaf)}

/* ---------- reading ---------- */
.read{padding:14px;display:flex;align-items:center;gap:10px}
.read svg{color:var(--asagao-deep);flex:none}
.read .nm{font-weight:900;font-size:.95rem}
.read .nm small{display:block;font-size:.7rem;color:var(--muted);font-weight:700}
.read .cnt{margin-left:auto;font-weight:900;font-size:1.2rem;font-variant-numeric:tabular-nums}
.read .cnt small{font-size:.72rem;color:var(--muted);font-weight:700}

footer{margin-top:28px;text-align:center;font-size:.7rem;color:var(--muted);font-weight:700}

@media (prefers-reduced-motion:reduce){
  *{transition:none!important}
}
button:focus-visible,.today-tile:focus-visible{outline:3px solid var(--asagao);outline-offset:2px}
</style>
</head>
<body>

<header>
  <div class="wrap">
    <div class="h-top">
      <svg width="30" height="30" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <circle cx="12" cy="10" r="7" fill="#fff" opacity=".92"/>
        <path d="M12 3.5 L13.8 8 L12 10 L10.2 8 Z M18.3 7 L15.5 10.2 L12 10 L14.5 6.2 Z M18.3 13 L14.5 13.8 L12 10 L15.5 9.8 Z M12 16.5 L10.2 12 L12 10 L13.8 12 Z M5.7 13 L9.5 9.8 L12 10 L9.5 13.8 Z M5.7 7 L9.5 6.2 L12 10 L8.5 10.2 Z" fill="#5560C4" opacity=".85"/>
        <circle cx="12" cy="10" r="2.2" fill="#D9799E"/>
        <path d="M12 17c0 3-2 4-4 4.5M12 17c1.5 1.5 3.5 1.5 5 .5" stroke="#8FD0A0" stroke-width="1.6" stroke-linecap="round"/>
      </svg>
      <div>
        <div class="h-title">なつやすみ しゅくだいチェッカー</div>
        <div class="h-sub">りくくん 1ねん2くみ・ていしゅつは 8/26(すい)</div>
      </div>
    </div>
    <div class="countdown">
      <span class="big" id="cd-num">--</span><span class="unit" id="cd-unit">日</span>
      <span class="until" id="cd-until">8月26日(水)まで</span>
    </div>
    <div class="vine">
      <div class="vine-track">
        <div class="vine-fill" id="vine-fill" style="width:0%"></div>
        <div class="vine-flower" id="vine-flower" style="left:0%">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <circle cx="12" cy="12" r="9" fill="#fff"/>
            <path d="M12 4 L14.2 9.5 L12 12 L9.8 9.5 Z M19.6 8 L15.9 12.3 L12 12 L15 7.2 Z M19.6 16 L15 16.8 L12 12 L15.9 11.7 Z M12 20 L9.8 14.5 L12 12 L14.2 14.5 Z M4.4 16 L8.1 11.7 L12 12 L9 16.8 Z M4.4 8 L9 7.2 L12 12 L8.1 12.3 Z" fill="#5560C4"/>
            <circle cx="12" cy="12" r="2.6" fill="#D9799E"/>
          </svg>
        </div>
      </div>
      <div class="vine-label"><span>ぜんぶの すすみぐあい</span><span id="vine-pct">0%</span></div>
    </div>
  </div>
</header>

<main class="wrap">

  <!-- ===== today ===== -->
  <section>
    <div class="sec-head">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
      <h2>きょうの ぶん</h2>
      <span class="note" id="today-date"></span>
    </div>
    <div class="today-grid" id="today-grid">
      <button class="today-tile" id="tile-ondoku" type="button">
        <svg class="ico" width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M2 4h6a4 4 0 0 1 4 4v12a3 3 0 0 0-3-3H2z"/><path d="M22 4h-6a4 4 0 0 0-4 4v12a3 3 0 0 1 3-3h7z"/></svg>
        おんどく
        <span class="st" id="st-ondoku">まだ</span>
      </button>
      <button class="today-tile" id="tile-mizu" type="button">
        <svg class="ico" width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 2.7 L17.2 10a6.5 6.5 0 1 1-10.4 0z"/></svg>
        みずやり
        <span class="st" id="st-mizu">まだ</span>
      </button>
      <div id="obs-alert-slot" style="display:contents"></div>
      <div class="today-total" id="ondoku-total"></div>
    </div>
  </section>

  <!-- ===== progress counters ===== -->
  <section>
    <div class="sec-head">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 3v18h18"/><path d="M7 15l4-4 3 3 5-6"/></svg>
      <h2>コツコツ すすめる</h2>
    </div>
    <div class="card" id="counters"></div>
  </section>

  <!-- ===== observation ===== -->
  <section>
    <div class="sec-head">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 22c4-3 8-6.5 8-11a8 8 0 1 0-16 0c0 4.5 4 8 8 11z" transform="rotate(180 12 11)"/><circle cx="12" cy="11" r="3"/></svg>
      <h2>あさがお かんさつカード</h2>
      <span class="note">4まい・めやす日つき</span>
    </div>
    <div class="card" style="padding:12px 14px">
      <div class="obs-list" id="obs-list"></div>
    </div>
  </section>

  <!-- ===== drills ===== -->
  <section>
    <div class="sec-head">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20V2H6.5A2.5 2.5 0 0 0 4 4.5z"/><path d="M4 19.5A2.5 2.5 0 0 0 6.5 22H20v-5"/></svg>
      <h2>ドリル</h2>
      <span class="note">タップで きりかえ</span>
    </div>
    <div class="card" id="drills"></div>
    <p class="stage-hint" style="margin-top:6px">まだ → やってるところ → こたえあわせすんだ!</p>
  </section>

  <!-- ===== one-shots ===== -->
  <section>
    <div class="sec-head">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M20 6 9 17l-5-5"/></svg>
      <h2>いっぱつもの</h2>
    </div>
    <div class="card" id="shots"></div>
  </section>

  <!-- ===== reading ===== -->
  <section>
    <div class="sec-head">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H19a1 1 0 0 1 1 1v18a1 1 0 0 1-1 1H6.5a2.5 2.5 0 0 1 0-5H20"/></svg>
      <h2>なつの どくしょカード</h2>
      <span class="note">ノルマなし・よんだら +1</span>
    </div>
    <div class="card">
      <div class="read">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M16 6l4 14"/><path d="M12 6v14"/><path d="M8 8v12"/><path d="M4 4v16"/></svg>
        <div class="nm">よんだ ほん<small>ももいろのカードに かくのを わすれずに</small></div>
        <div class="cnt"><span id="read-cnt">0</span> <small>さつ</small></div>
        <button class="btn" id="read-minus" type="button" aria-label="1さつ へらす"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M5 12h14"/></svg></button>
        <button class="btn" id="read-plus" type="button" aria-label="1さつ ふやす"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg></button>
      </div>
    </div>
  </section>

  <footer>8がつ26にち(すい)に ふうとうにいれて がっこうへ</footer>
</main>

<script>
"use strict";

/* ---------- config ---------- */
const DEADLINE = new Date(2026, 7, 26); // 2026-08-26
const OBS = [
  { key:"obs1", label:"はなが さいてるところ",       hint:"7/23 ごろ", target:new Date(2026,6,23) },
  { key:"obs2", label:"はなが いっぱいのところ",     hint:"8/2 ごろ",  target:new Date(2026,7,2)  },
  { key:"obs3", label:"みどりの みが できたところ", hint:"8/16 ごろ", target:new Date(2026,7,16) },
  { key:"obs4", label:"ちゃいろの み(たねとりも いっしょに!)", hint:"8/22 ごろ", target:new Date(2026,7,22) }
];
const COUNTERS = [
  { key:"keisan",    name:"けいさんカード", sub:"ぜんぶで 25かい", max:25 },
  { key:"purinto",   name:"ひらがなプリント", sub:"2まい", max:2 },
  { key:"charenji",  name:"なつやすみ 10のチャレンジ", sub:"おてつだい 10こ", max:10 }
];
const DRILLS = [
  { key:"nobinobi", name:"なつのびのび",  sub:"こたえあわせ・やりなおしまで" },
  { key:"kitaeru",  name:"きたえるなつ",  sub:"こたえあわせ・やりなおしまで" }
];
const SHOTS = [
  { key:"takara",  name:"なつやすみの たからもの", sub:"にっき 1まい",
    icon:'<path d="M6 3h12l4 6-10 12L2 9z"/><path d="M2 9h20"/><path d="M10 3 8 9l4 12 4-12-2-6"/>' },
  { key:"kenkyuu", name:"じゆうけんきゅう", sub:"え・こうさく・かんさつ など 1ついじょう",
    icon:'<path d="M10 2v6.5L4.5 18a2 2 0 0 0 1.8 3h11.4a2 2 0 0 0 1.8-3L14 8.5V2"/><path d="M8.5 2h7"/><path d="M7 15h10"/>' },
  { key:"tane",    name:"あさがおの たねとり", sub:"ふくろにいれて もっていく・かんさつ④と同じ日に",
    icon:'<path d="M7 20h10"/><path d="M12 20v-8"/><path d="M12 12A6 6 0 0 0 6 6H4a6 6 0 0 0 6 6z"/><path d="M12 10a5 5 0 0 1 5-5h3a5 5 0 0 1-5 5z"/>' }
];
const STAGE_LABEL = ["まだ","やってるところ","こたえあわせ すんだ!"];

/* ---------- state ---------- */
const KEY = "shukudai-riku-2026";
const defaults = {
  daily:{ date:"", ondoku:false, mizu:false },
  ondokuTotal:0,
  counts:{ keisan:0, purinto:0, charenji:0 },
  drills:{ nobinobi:0, kitaeru:0 },
  obs:{ obs1:false, obs2:false, obs3:false, obs4:false },
  shots:{ takara:false, kenkyuu:false, tane:false },
  read:0
};
let S;
try{
  S = Object.assign({}, defaults, JSON.parse(localStorage.getItem(KEY) || "{}"));
  ["daily","counts","drills","obs","shots"].forEach(k=>{ S[k] = Object.assign({}, defaults[k], S[k]); });
}catch(e){ S = JSON.parse(JSON.stringify(defaults)); }

function save(){ localStorage.setItem(KEY, JSON.stringify(S)); }

/* ---------- date helpers ---------- */
function todayStr(){
  const d = new Date();
  return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
}
function daysUntil(target){
  const now = new Date(); now.setHours(0,0,0,0);
  const t = new Date(target); t.setHours(0,0,0,0);
  return Math.round((t - now) / 86400000);
}

/* daily reset */
if (S.daily.date !== todayStr()){
  S.daily = { date: todayStr(), ondoku:false, mizu:false };
  save();
}

/* ---------- render: header ---------- */
function renderHeader(){
  const left = daysUntil(DEADLINE);
  const num = document.getElementById("cd-num");
  const unit = document.getElementById("cd-unit");
  const until = document.getElementById("cd-until");
  if (left > 0){ num.textContent = "あと" + left; unit.textContent = "日"; }
  else if (left === 0){ num.textContent = "きょう"; unit.textContent = "提出日!"; }
  else { num.textContent = "おつかれさま"; unit.textContent = ""; until.textContent = "夏休み終了!"; }

  // overall progress: finite units only
  const total = 25 + 2 + 10 + 4 + 2 + 3; // keisan + purinto + charenji + obs + drills + shots = 46
  let done = S.counts.keisan + S.counts.purinto + S.counts.charenji;
  done += Object.values(S.obs).filter(Boolean).length;
  done += Object.values(S.drills).filter(v=>v===2).length;
  done += Object.values(S.shots).filter(Boolean).length;
  const pct = Math.round(done / total * 100);
  document.getElementById("vine-fill").style.width = pct + "%";
  document.getElementById("vine-flower").style.left = pct + "%";
  document.getElementById("vine-pct").textContent = pct + "%";
}

/* ---------- render: today ---------- */
function renderToday(){
  const d = new Date();
  const youbi = ["にち","げつ","か","すい","もく","きん","ど"][d.getDay()];
  document.getElementById("today-date").textContent = (d.getMonth()+1)+"/"+d.getDate()+"("+youbi+")";

  const tiles = [["ondoku","tile-ondoku","st-ondoku"],["mizu","tile-mizu","st-mizu"]];
  tiles.forEach(([k,tid,sid])=>{
    const t = document.getElementById(tid);
    t.classList.toggle("done", S.daily[k]);
    document.getElementById(sid).textContent = S.daily[k] ? "できた!" : "まだ";
  });
  document.getElementById("ondoku-total").textContent = "おんどく つうさん " + S.ondokuTotal + "回";

  // observation alert: nearest undone obs whose target is within 3 days (or past)
  const slot = document.getElementById("obs-alert-slot");
  slot.innerHTML = "";
  const next = OBS.find(o => !S.obs[o.key] && daysUntil(o.target) <= 3);
  if (next){
    const dd = daysUntil(next.target);
    const when = dd > 0 ? "めやすまで あと"+dd+"日" : dd === 0 ? "きょうが めやす日!" : "めやす日 すぎてます!";
    const div = document.createElement("div");
    div.className = "obs-alert";
    div.innerHTML =
      '<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 9v4"/><path d="M12 17h.01"/><path d="M10.3 3.8 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.8a2 2 0 0 0-3.4 0z"/></svg>' +
      '<div><div class="t">かんさつカード' + "①②③④"[OBS.indexOf(next)] + '</div><div class="d">' + next.label + '・' + when + '</div></div>' +
      '<button type="button">かいた!</button>';
    div.querySelector("button").addEventListener("click", ()=>{
      S.obs[next.key] = true; save(); renderAll();
    });
    slot.appendChild(div);
  }
}

/* ---------- render: counters ---------- */
function renderCounters(){
  const box = document.getElementById("counters");
  box.innerHTML = "";
  COUNTERS.forEach(c=>{
    const v = S.counts[c.key];
    const full = v >= c.max;
    const row = document.createElement("div");
    row.className = "row";
    row.innerHTML =
      '<div class="row-top">' +
        '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">' + counterIcon(c.key) + '</svg>' +
        '<div class="row-name">' + c.name + '<small>' + c.sub + '</small></div>' +
        '<div class="row-count">' + (full ? '<span class="done-chip"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>コンプリート!</span>' : v + ' <small>/ ' + c.max + '</small>') + '</div>' +
      '</div>' +
      '<div class="row-ctrl">' +
        '<button class="btn b-minus" type="button" aria-label="へらす"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M5 12h14"/></svg></button>' +
        '<div class="bar' + (full ? ' full' : '') + '"><i style="width:' + (v/c.max*100) + '%"></i></div>' +
        '<button class="btn b-plus" type="button" aria-label="ふやす"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg></button>' +
      '</div>';
    const minus = row.querySelector(".b-minus"), plus = row.querySelector(".b-plus");
    minus.disabled = v <= 0; plus.disabled = full;
    minus.addEventListener("click", ()=>{ S.counts[c.key] = Math.max(0, S.counts[c.key]-1); save(); renderAll(); });
    plus.addEventListener("click", ()=>{ S.counts[c.key] = Math.min(c.max, S.counts[c.key]+1); save(); renderAll(); });
    box.appendChild(row);
  });
}
function counterIcon(key){
  if (key === "keisan") return '<rect x="4" y="2" width="16" height="20" rx="2"/><path d="M8 6h8"/><path d="M8 11h.01M12 11h.01M16 11h.01M8 15h.01M12 15h.01M16 15h.01M8 19h.01M12 19h.01M16 19h.01"/>';
  if (key === "purinto") return '<path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4z"/>';
  return '<path d="M11 14 9 12l-2 2 4 4 8-8-2-2z"/><path d="M12 3a9 9 0 1 0 9 9"/><path d="M17 3h4v4"/>';
}

/* ---------- render: observation list ---------- */
function renderObs(){
  const box = document.getElementById("obs-list");
  box.innerHTML = "";
  OBS.forEach((o,i)=>{
    const done = S.obs[o.key];
    const dd = daysUntil(o.target);
    const btn = document.createElement("button");
    btn.type = "button";
    btn.className = "obs-item" + (done ? " done" : (dd <= 3 && dd >= -30 ? " soon" : ""));
    btn.innerHTML =
      '<span class="num">' + (i+1) + '</span>' +
      '<span class="lbl">' + o.label + '<small>めやす ' + o.hint + '</small></span>' +
      '<span class="mark">' + (done
        ? '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>'
        : '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="9"/></svg>') + '</span>';
    btn.addEventListener("click", ()=>{ S.obs[o.key] = !S.obs[o.key]; save(); renderAll(); });
    box.appendChild(btn);
  });
}

/* ---------- render: drills ---------- */
function renderDrills(){
  const box = document.getElementById("drills");
  box.innerHTML = "";
  DRILLS.forEach(d=>{
    const st = S.drills[d.key];
    const row = document.createElement("div");
    row.className = "row";
    row.innerHTML =
      '<div class="row-top">' +
        '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20V2H6.5A2.5 2.5 0 0 0 4 4.5z"/></svg>' +
        '<div class="row-name">' + d.name + '<small>' + d.sub + '</small></div>' +
        '<button class="stage-btn stage-' + st + '" type="button">' + STAGE_LABEL[st] + '</button>' +
      '</div>';
    row.querySelector(".stage-btn").addEventListener("click", ()=>{
      S.drills[d.key] = (S.drills[d.key] + 1) % 3; save(); renderAll();
    });
    box.appendChild(row);
  });
}

/* ---------- render: one-shots ---------- */
function renderShots(){
  const box = document.getElementById("shots");
  box.innerHTML = "";
  SHOTS.forEach(s=>{
    const done = S.shots[s.key];
    const btn = document.createElement("button");
    btn.type = "button";
    btn.className = "shot" + (done ? " done" : "");
    btn.innerHTML =
      '<svg class="ic" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">' + s.icon + '</svg>' +
      '<div class="nm">' + s.name + '<small>' + s.sub + '</small></div>' +
      '<span class="box"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg></span>';
    btn.addEventListener("click", ()=>{
      S.shots[s.key] = !S.shots[s.key];
      if (s.key === "tane" && S.shots.tane && !S.obs.obs4){
        // taking seeds usually means obs4 moment — but don't auto-check, just save
      }
      save(); renderAll();
    });
    box.appendChild(btn);
  });
}

/* ---------- render: reading ---------- */
function renderRead(){
  document.getElementById("read-cnt").textContent = S.read;
  document.getElementById("read-minus").disabled = S.read <= 0;
}
document.getElementById("read-plus").addEventListener("click", ()=>{ S.read++; save(); renderRead(); });
document.getElementById("read-minus").addEventListener("click", ()=>{ S.read = Math.max(0, S.read-1); save(); renderRead(); });

/* ---------- today tiles ---------- */
document.getElementById("tile-ondoku").addEventListener("click", ()=>{
  S.daily.ondoku = !S.daily.ondoku;
  S.ondokuTotal = Math.max(0, S.ondokuTotal + (S.daily.ondoku ? 1 : -1));
  save(); renderAll();
});
document.getElementById("tile-mizu").addEventListener("click", ()=>{
  S.daily.mizu = !S.daily.mizu; save(); renderAll();
});

/* ---------- boot ---------- */
function renderAll(){
  renderHeader(); renderToday(); renderCounters(); renderObs(); renderDrills(); renderRead(); renderShots();
}
renderAll();

/* re-check date when app returns to foreground (PWA-style usage) */
document.addEventListener("visibilitychange", ()=>{
  if (!document.hidden && S.daily.date !== todayStr()){
    S.daily = { date: todayStr(), ondoku:false, mizu:false };
    save(); renderAll();
  }
});
</script>
</body>
</html>
